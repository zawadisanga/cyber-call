<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCall | Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/neon-blue.css">
    <style>
        .chat-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 243, 255, 0.1);
            border: none;
            color: var(--neon-blue);
            cursor: pointer;
        }

        .chat-partner {
            flex: 1;
        }

        .partner-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .partner-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            max-width: 70%;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-content {
            padding: 10px 15px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .message.sent .message-content {
            background: var(--neon-blue);
            color: var(--dark-bg);
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .typing-indicator {
            padding: 10px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .message-input-area {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            gap: 1rem;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--neon-blue);
            border: none;
            color: var(--dark-bg);
            cursor: pointer;
        }

        .voice-note-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--neon-blue);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .message { max-width: 85%; }
            .chat-messages { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <button class="back-btn" onclick="location.href='/users.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="chat-partner">
                <div class="partner-name" id="partnerName">Loading...</div>
                <div class="partner-status" id="partnerStatus">Offline</div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div class="message-input-area">
            <button class="voice-note-btn" onclick="startVoiceNote()">
                <i class="fas fa-microphone"></i>
            </button>
            <input type="text" id="messageInput" class="input-neon message-input" placeholder="Type a message...">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/encryption-client.js"></script>
    <script>
        let socket;
        let currentUser;
        let chatPartner;
        let messages = [];
        let typingTimeout;

        // Load data
        const userData = localStorage.getItem('userData');
        const partnerData = localStorage.getItem('chatPartner');
        
        if (!userData || !partnerData) {
            window.location.href = '/users.html';
        }
        
        currentUser = JSON.parse(userData);
        chatPartner = JSON.parse(partnerData);

        document.getElementById('partnerName').textContent = chatPartner.username;

        // Connect socket
        socket = io();
        
        socket.on('connect', () => {
            socket.emit('user-online', {
                userId: currentUser.userId,
                username: currentUser.username,
                country: currentUser.country
            });
        });

        socket.on('new-message', (data) => {
            if (data.from === chatPartner.userId) {
                addMessage(data.message, false, data.timestamp);
            }
        });

        socket.on('user-typing', (data) => {
            if (data.from === chatPartner.userId) {
                showTypingIndicator();
            }
        });

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, true);
            
            socket.emit('send-message', {
                to: chatPartner.userId,
                from: currentUser.userId,
                message: message,
                type: 'text'
            });
            
            input.value = '';
        }

        function addMessage(message, isSent, timestamp) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${message}
                    <div class="message-time">${new Date(timestamp || Date.now()).toLocaleTimeString()}</div>
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
            socket.emit('typing', {
                to: chatPartner.userId,
                from: currentUser.userId
            });
        });

        function showTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = 'block';
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                indicator.style.display = 'none';
            }, 1000);
        }

        function startVoiceNote() {
            window.location.href = '/voice-note.html';
        }
    </script>
</body>
</html>
